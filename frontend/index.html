<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator | Your Developer Identity</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="hero">
            <div class="hero-content">
                <span class="hero-badge">Developer Identity</span>
                <h1 class="hero-title">Generate your <span class="gradient-text">Developer Identity</span></h1>
                <p class="hero-subtitle">Transform your GitHub profile into a premium developer card using AI-powered insights and stunning visuals.</p>
            </div>

            <div class="search-section">
                <div class="search-container">
                    <div class="search-input-wrapper">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <input type="text" id="username-input" placeholder="Enter GitHub username" spellcheck="false">
                    </div>
                    <button id="generate-btn" class="primary-button">
                        <span class="btn-text">Generate</span>
                        <div class="btn-loader hidden"></div>
                    </button>
                </div>
            </div>
        </header>

        <main class="content-area">
            <div id="loading-state" class="hidden">
                <div class="card-skeleton">
                    <div class="skeleton-left">
                        <div class="skeleton-avatar"></div>
                        <div class="skeleton-line short"></div>
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line long"></div>
                        <div class="skeleton-qr"></div>
                    </div>
                    <div class="skeleton-right">
                        <div class="skeleton-grid">
                            <div class="skeleton-block"></div>
                            <div class="skeleton-block"></div>
                            <div class="skeleton-block"></div>
                        </div>
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-badges">
                            <div class="skeleton-badge"></div>
                            <div class="skeleton-badge"></div>
                            <div class="skeleton-badge"></div>
                        </div>
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-repos">
                            <div class="skeleton-repo"></div>
                            <div class="skeleton-repo"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="action-buttons" class="action-buttons hidden">
                <button id="copy-url-btn" class="secondary-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                    Copy Link
                </button>
                <button id="download-html-btn" class="secondary-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    HTML
                </button>
                <button id="export-png-btn" class="secondary-button">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    PNG
                </button>
            </div>
            <div id="card-container" class="hidden">
                <!-- Card will be rendered here dynamically -->
            </div>
        </main>

        <footer class="app-footer">
            <p>&copy; 2024 GitHub Dev Card. Built for the community.</p>
        </footer>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
